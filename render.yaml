services:
  - type: web
    name: vonage-playground
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: VONAGE_MESSAGES_BASE_URL
        sync: false
      - key: VONAGE_FROM_NUMBER
        sync: false
