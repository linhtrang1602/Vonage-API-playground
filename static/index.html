<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vonage API Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="p-4 md:p-8">

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <header class="text-center mb-10 animate-slide-up">
      <h1 class="text-4xl font-bold mb-2">🔷 <span class="gradient-text">Vonage API Playground</span></h1>
      <p class="text-slate-400">Interactive demo for Vonage Verify & Messages APIs</p>
    </header>

    <!-- Tab Bar -->
    <div class="flex justify-center mb-8 animate-slide-up" style="animation-delay: 0.1s;">
      <div class="glass-card p-1 flex relative rounded-2xl">
        <!-- <button class="tab-btn" data-tab="verify">🔐 Verify OTP</button> -->
        <button class="tab-btn tab-active" data-tab="messages">💬 Messages</button>
        <div id="tab-indicator"></div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="animate-slide-up" style="animation-delay: 0.2s;">
      
      <!-- ==================== VERIFY OTP TAB ==================== -->
      <section id="tab-verify" data-panel="verify" class="glass-card p-8 hidden">
        <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
          <span class="text-purple-400">🔐</span> Two-Factor Authentication
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Form Area -->
          <div>
            <!-- Step 1: Send OTP -->
            <div id="verify-step1" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Số điện thoại</label>
                <input type="text" id="verify-phone" class="input-field" placeholder="+8498xxxxxxx">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Brand Name</label>
                <input type="text" id="verify-brand" class="input-field" placeholder="VonageDemo" value="VonageDemo">
              </div>
              <button id="btn-send-otp" class="btn btn-primary w-full mt-2">🚀 Gửi OTP</button>
            </div>

            <!-- Step 2: Check OTP (Hidden initially) -->
            <div id="verify-step2" class="space-y-4 mt-6 pt-6 border-t border-white/10 hidden">
              <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Mã xác thực (OTP)</label>
                <input type="text" id="verify-otp" class="input-field text-center text-xl tracking-widest" placeholder="••••••" maxlength="6">
              </div>
              <div class="flex gap-3">
                <button id="btn-check-otp" class="btn btn-primary flex-1">✔️ Xác nhận</button>
                <button id="btn-cancel-otp" class="btn btn-danger btn-outline px-4">🚫 Huỷ OTP</button>
              </div>
            </div>

            <!-- Status Result Area -->
            <div id="verify-result" class="hidden"></div>
          </div>

          <!-- Debug Area -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm font-medium text-slate-400">API Logs</span>
              <button id="btn-toggle-debug" class="text-xs text-purple-400 hover:text-purple-300">🔍 Hide Debug</button>
            </div>
            <div id="verify-debug" class="debug-panel h-[320px] overflow-y-auto">
              <div id="verify-debug-content"></div>
              <div class="text-xs text-slate-600 italic">Waiting for API calls...</div>
            </div>
          </div>
        </div>
      </section>


      <!-- ==================== MESSAGES TAB ==================== -->
      <section id="tab-messages" data-panel="messages" class="glass-card p-8">
        <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
          <span class="text-blue-400">💬</span> Two-Way Messaging
        </h2>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          <!-- Send Form -->
          <div class="lg:col-span-5 space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-1">Channel</label>
              <select id="msg-channel" class="input-field">
                <option value="whatsapp">WhatsApp</option>
                <option value="viber_service">Viber</option>
                <option value="messenger">Facebook Messenger</option>
                <option value="instagram">Instagram</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-1">Số người nhận</label>
              <input type="text" id="msg-recipient" class="input-field" placeholder="+8498xxxxxxx">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-1">Nội dung</label>
              <textarea id="msg-text" class="input-field h-32 resize-none" placeholder="Nhập tin nhắn..."></textarea>
            </div>
            <button id="btn-send-msg" class="btn btn-primary w-full">📨 Gửi tin</button>
          </div>

          <!-- Conversation Log -->
          <div class="lg:col-span-7 flex flex-col h-[400px]">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm font-medium text-slate-400">Conversation Log</span>
              
              <!-- WebSocket Status -->
              <div id="ws-status" class="flex items-center gap-2 bg-black/30 px-3 py-1 rounded-full border border-white/5">
                <div id="ws-status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="ws-status-text" class="text-xs text-red-400">Connecting...</span>
              </div>
            </div>

            <div id="conversation-container" class="flex-1 bg-black/20 rounded-xl border border-white/5 p-4 flex flex-col">
              <div id="conversation-log" class="flex-1 overflow-y-auto pr-2 space-y-3">
                <div id="conversation-empty" class="h-full flex items-center justify-center text-sm text-slate-500 italic">
                  Chưa có tin nhắn nào. Gửi tin hoặc chờ webhook...
                </div>
              </div>
            </div>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="/static/js/app.js"></script>
  <script src="/static/js/verify.js"></script>
  <script src="/static/js/messages.js"></script>
</body>
</html>
